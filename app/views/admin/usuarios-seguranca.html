<div class="content-wrapper"><section class="content-header painel-topo"><h1><i class="bi bi-person-lock"></i> Segurança dos Usuários<small>Ativar, inativar e bloquear login</small></h1></section><section class="content"><div class="card mb-4 painel-formulario"><div class="card-header cabecalho-formulario"><div class="card-title">Usuários</div></div><div class="card-body p-0"><table class="table"><thead><tr><th>Nome</th><th>CPF</th><th>Perfil</th><th>Usuário</th><th>Funcionário</th><th>Ações</th></tr></thead><tbody>{loop="$usuarios"}<tr><td>{$value.nome_funcionario}</td><td>{$value.cpf}</td><td>{$value.perfil}</td><td>{if="$value.usuario_ativo == 1"}<span class="badge bg-success">Ativo</span>{else}<span class="badge bg-danger">Bloqueado</span>{/if}</td><td>{if="$value.funcionario_ativo == 1"}<span class="badge bg-success">Ativo</span>{else}<span class="badge bg-secondary">Inativo</span>{/if}</td><td><form method="post" action="/admin/usuarios/{$value.id_usuario}/status" style="display:inline-block"><input type="hidden" name="ativo" value="{if="$value.usuario_ativo == 1"}0{else}1{/if}"><button class="btn btn-xs btn-warning" type="submit">{if="$value.usuario_ativo == 1"}Bloquear login{else}Ativar login{/if}</button></form> <form method="post" action="/admin/funcionarios/{$value.id_pessoa}/status-funcionario" style="display:inline-block"><input type="hidden" name="ativo" value="{if="$value.funcionario_ativo == 1"}0{else}1{/if}"><button class="btn btn-xs btn-default" type="submit">{if="$value.funcionario_ativo == 1"}Inativar funcionário{else}Ativar funcionário{/if}</button></form></td></tr>{/loop}</tbody></table></div></div></section></div>
