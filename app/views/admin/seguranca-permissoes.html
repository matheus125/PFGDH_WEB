<div class="content-wrapper"><section class="content-header painel-topo"><h1><i class="bi bi-shield-lock"></i> Permissões por Perfil<small>Gerencie ACL por perfil</small></h1></section><section class="content"><form method="post" action="/admin/seguranca/permissoes"><div class="card mb-4 painel-formulario"><div class="card-header cabecalho-formulario"><div class="card-title">Matriz de Permissões</div></div><div class="card-body">{loop="$permissions"}<div class="row mb-2"><div class="col-md-4"><strong>{$value.module_name}</strong> - {$value.description}<br><small class="text-muted">{$value.permission_key}</small></div><div class="col-md-8"><label class="me-3"><input type="checkbox" name="permissions[ADMIN][]" value="{$value.permission_key}" {if="in_array($value.permission_key, $admin_permissions)"}checked{/if}> ADMIN</label><label class="me-3"><input type="checkbox" name="permissions[SUPERVISOR][]" value="{$value.permission_key}" {if="in_array($value.permission_key, $supervisor_permissions)"}checked{/if}> SUPERVISOR</label><label><input type="checkbox" name="permissions[ASSESSOR][]" value="{$value.permission_key}" {if="in_array($value.permission_key, $assessor_permissions)"}checked{/if}> ASSESSOR</label></div></div><hr>{/loop}</div><div class="card-footer"><button class="btn btn-primary" type="submit">Salvar Permissões</button></div></div></form></section></div>
