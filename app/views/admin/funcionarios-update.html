<!-- Content Wrapper. Contains page content -->
<div class="content-wrapper">

  <!-- Cabeçalho -->
  <section class="content-header painel-topo">
    <div class="row">
      <div class="col-sm-8">
        <h1>
          <i class="fa fa-users text-primary"></i> Funcionários
          <small>Editar cadastro do usuário</small>
        </h1>
      </div>
      <div class="col-sm-4 text-right">
        <ol class="breadcrumb">
          <li>
            <a href="/admin">
              <i class="fa fa-dashboard"></i> Home
            </a>
          </li>
          <li>
            <a href="/admin/funcionarios">
              <i class="fa fa-users"></i> Funcionários
            </a>
          </li>
          <li class="active">
            <i class="fa fa-edit"></i> Editar
          </li>
        </ol>
      </div>
    </div>
  </section>

  <!-- Conteúdo -->
  <section class="content">

    <!-- ALERTA -->
    <div id="alerta-form" class="alert alert-danger" style="display:none;">
      <i class="fa fa-warning"></i>
      <span id="alerta-form-texto"></span>
    </div>

    <!-- Card resumo -->
    <div class="row">
      <div class="col-md-10 col-md-offset-1">
        <div class="small-box bg-aqua painel-resumo">
          <div class="inner">
            <h3>{$funcionarios.id_usuario}</h3>
            <p>Usuário em edição: {$funcionarios.nome_funcionario}</p>
          </div>
          <div class="icon">
            <i class="fa fa-id-badge"></i>
          </div>
        </div>
      </div>
    </div>

    <!-- Formulário -->
    <div class="row">
      <div class="col-md-10 col-md-offset-1">
        <div class="box box-primary painel-formulario">
          <div class="box-header with-border cabecalho-formulario">
            <h3 class="box-title">
              <i class="fa fa-user-circle"></i> Dados do Usuário
            </h3>
          </div>

          <form id="form-funcionario" action="/admin/funcionarios/{$funcionarios.id_usuario}" method="post">
            <div class="box-body">

              <div class="row">
                <!-- Nome -->
                <div class="col-md-6">
                  <div class="form-group">
                    <label for="nome_funcionario">Nome completo</label>
                    <div class="input-group">
                      <span class="input-group-addon">
                        <i class="fa fa-user"></i>
                      </span>
                      <input type="text" class="form-control" id="nome_funcionario" name="nome_funcionario"
                        placeholder="Digite o nome completo" value="{$funcionarios.nome_funcionario}" required>
                    </div>
                    <small class="help-block msg-erro" id="nome-msg"></small>
                  </div>
                </div>

                <!-- CPF -->
                <div class="col-md-6">
                  <div class="form-group">
                    <label for="cpf">CPF / Login</label>
                    <div class="input-group">
                      <span class="input-group-addon">
                        <i class="fa fa-id-card"></i>
                      </span>
                      <input type="text" class="form-control" id="cpf" name="cpf" placeholder="Digite o CPF"
                        value="{$funcionarios.cpf}" required>
                    </div>
                    <small class="help-block msg-erro" id="cpf-msg"></small>
                  </div>
                </div>
              </div>

              <div class="row">
                <!-- Telefone -->
                <div class="col-md-6">
                  <div class="form-group">
                    <label for="nrphone">Telefone</label>
                    <div class="input-group">
                      <span class="input-group-addon">
                        <i class="fa fa-phone"></i>
                      </span>
                      <input type="tel" class="form-control" id="nrphone" name="nrphone" placeholder="(92) 99999-9999"
                        value="{$funcionarios.nrphone}">
                    </div>
                    <small class="help-block msg-erro" id="telefone-msg"></small>
                  </div>
                </div>

                <!-- Email -->
                <div class="col-md-6">
                  <div class="form-group">
                    <label for="email">E-mail</label>
                    <div class="input-group">
                      <span class="input-group-addon">
                        <i class="fa fa-envelope"></i>
                      </span>
                      <input type="email" class="form-control" id="email" name="email" placeholder="Digite o e-mail"
                        value="{$funcionarios.email}" required>
                    </div>
                    <small class="help-block msg-erro" id="email-msg"></small>
                  </div>
                </div>
              </div>

              <div class="row">
                <!-- Perfil -->
                <div class="col-md-6">
                  <div class="form-group">
                    <label for="perfil">Perfil de Acesso</label>
                    <div class="input-group">
                      <span class="input-group-addon">
                        <i class="fa fa-lock"></i>
                      </span>
                      <select name="perfil" id="perfil" class="form-control" required>
                        <option value="">Selecione o perfil</option>
                        <option value="ADMIN" {if $funcionarios.perfil=='ADMIN' }selected{/if}>Administrador</option>
                        <option value="SUPERVISOR" {if $funcionarios.perfil=='SUPERVISOR' }selected{/if}>Supervisor
                        </option>
                        <option value="ASSESSOR" {if $funcionarios.perfil=='ASSESSOR' }selected{/if}>Assessor</option>
                      </select>
                    </div>
                    <small class="help-block msg-erro" id="perfil-msg"></small>
                  </div>
                </div>

                <!-- ID -->
                <div class="col-md-6">
                  <div class="form-group">
                    <label for="id_usuario">ID do Usuário</label>
                    <div class="input-group">
                      <span class="input-group-addon">
                        <i class="fa fa-hashtag"></i>
                      </span>
                      <input type="text" class="form-control" id="id_usuario" name="id_usuario"
                        value="{$funcionarios.id_usuario}" readonly>
                    </div>
                  </div>
                </div>
              </div>

            </div>

            <div class="box-footer clearfix">
              <a href="/admin/funcionarios" class="btn btn-default">
                <i class="fa fa-arrow-left"></i> Voltar
              </a>

              <button type="reset" class="btn btn-warning" id="btn-limpar">
                <i class="fa fa-eraser"></i> Limpar
              </button>

              <button type="submit" class="btn btn-primary pull-right" id="btn-salvar">
                <i class="fa fa-save"></i> Salvar Alterações
              </button>
            </div>
          </form>
        </div>
      </div>
    </div>

  </section>
</div>

<!-- jQuery -->
<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

<!-- jQuery Mask -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/jquery.mask/1.14.16/jquery.mask.min.js"></script>

<script>
  $(document).ready(function () {
    $('#cpf').mask('000.000.000-00');
    $('#nrphone').mask('(00) 00000-0000');

    function limparErros() {
      $('.form-control').removeClass('input-error input-success');
      $('.msg-erro').text('');
      $('#alerta-form').hide();
      $('#alerta-form-texto').text('');
    }

    function mostrarAlerta(msg) {
      $('#alerta-form-texto').text(msg);
      $('#alerta-form').fadeIn();
      $('html, body').animate({
        scrollTop: $('#alerta-form').offset().top - 20
      }, 300);
    }

    function marcarErro(campo, msgId, mensagem) {
      $(campo).removeClass('input-success').addClass('input-error');
      $(msgId).text(mensagem);
    }

    function marcarSucesso(campo, msgId) {
      $(campo).removeClass('input-error').addClass('input-success');
      $(msgId).text('');
    }

    function validarEmail(email) {
      var re = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
      return re.test(email);
    }

    function validarCPF(cpf) {
      cpf = cpf.replace(/\D/g, '');

      if (cpf.length !== 11) return false;
      if (/^(\d)\1+$/.test(cpf)) return false;

      var soma = 0;
      var resto;

      for (var i = 1; i <= 9; i++) {
        soma = soma + parseInt(cpf.substring(i - 1, i), 10) * (11 - i);
      }

      resto = (soma * 10) % 11;
      if (resto === 10 || resto === 11) resto = 0;
      if (resto !== parseInt(cpf.substring(9, 10), 10)) return false;

      soma = 0;
      for (var j = 1; j <= 10; j++) {
        soma = soma + parseInt(cpf.substring(j - 1, j), 10) * (12 - j);
      }

      resto = (soma * 10) % 11;
      if (resto === 10 || resto === 11) resto = 0;
      if (resto !== parseInt(cpf.substring(10, 11), 10)) return false;

      return true;
    }

    function validarFormulario() {
      limparErros();

      var valido = true;

      var nome = $('#nome_funcionario').val().trim();
      var cpf = $('#cpf').val().trim();
      var telefone = $('#nrphone').val().trim();
      var email = $('#email').val().trim();
      var perfil = $('#perfil').val();

      if (nome === '') {
        marcarErro('#nome_funcionario', '#nome-msg', 'Informe o nome do funcionário.');
        valido = false;
      } else {
        marcarSucesso('#nome_funcionario', '#nome-msg');
      }

      if (cpf === '') {
        marcarErro('#cpf', '#cpf-msg', 'Informe o CPF.');
        valido = false;
      } else if (!validarCPF(cpf)) {
        marcarErro('#cpf', '#cpf-msg', 'CPF inválido.');
        valido = false;
      } else {
        marcarSucesso('#cpf', '#cpf-msg');
      }

      if (telefone !== '' && telefone.replace(/\D/g, '').length < 10) {
        marcarErro('#nrphone', '#telefone-msg', 'Telefone incompleto.');
        valido = false;
      } else if (telefone !== '') {
        marcarSucesso('#nrphone', '#telefone-msg');
      }

      if (email === '') {
        marcarErro('#email', '#email-msg', 'Informe o e-mail.');
        valido = false;
      } else if (!validarEmail(email)) {
        marcarErro('#email', '#email-msg', 'E-mail inválido.');
        valido = false;
      } else {
        marcarSucesso('#email', '#email-msg');
      }

      if (perfil === '') {
        marcarErro('#perfil', '#perfil-msg', 'Selecione o perfil de acesso.');
        valido = false;
      } else {
        marcarSucesso('#perfil', '#perfil-msg');
      }

      if (!valido) {
        mostrarAlerta('Corrija os campos destacados antes de salvar.');
      }

      return valido;
    }

    $('#cpf').on('blur', function () {
      var cpf = $(this).val().trim();

      if (cpf === '') {
        marcarErro('#cpf', '#cpf-msg', 'Informe o CPF.');
        return;
      }

      if (!validarCPF(cpf)) {
        marcarErro('#cpf', '#cpf-msg', 'CPF inválido.');
      } else {
        marcarSucesso('#cpf', '#cpf-msg');


        // OPCIONAL: verificar CPF duplicado via AJAX
        $.ajax({
          url: '/admin/funcionarios/verificar-cpf',
          type: 'POST',
          dataType: 'json',
          data: {
            cpf: $('#cpf').val(),
            id_usuario: $('#id_usuario').val()
          },
          success: function (res) {
            if (res.existe) {
              marcarErro('#cpf', '#cpf-msg', 'Este CPF já está cadastrado para outro usuário.');
            } else {
              marcarSucesso('#cpf', '#cpf-msg');
            }
          },
          error: function () {
            marcarErro('#cpf', '#cpf-msg', 'Não foi possível verificar o CPF agora.');
          }
        });

      }
    });

    $('#email').on('blur', function () {
      var email = $(this).val().trim();

      if (email === '') {
        marcarErro('#email', '#email-msg', 'Informe o e-mail.');
      } else if (!validarEmail(email)) {
        marcarErro('#email', '#email-msg', 'E-mail inválido.');
      } else {
        marcarSucesso('#email', '#email-msg');
      }
    });

    $('#nome_funcionario').on('blur', function () {
      var nome = $(this).val().trim();

      if (nome === '') {
        marcarErro('#nome_funcionario', '#nome-msg', 'Informe o nome do funcionário.');
      } else {
        marcarSucesso('#nome_funcionario', '#nome-msg');
      }
    });

    $('#perfil').on('change', function () {
      if ($(this).val() === '') {
        marcarErro('#perfil', '#perfil-msg', 'Selecione o perfil de acesso.');
      } else {
        marcarSucesso('#perfil', '#perfil-msg');
      }
    });

    $('#btn-limpar').on('click', function () {
      setTimeout(function () {
        limparErros();
      }, 50);
    });

    $('#form-funcionario').on('submit', function (e) {
      if (!validarFormulario()) {
        e.preventDefault();
        return false;
      }

      $('#btn-salvar')
        .prop('disabled', true)
        .html('<i class="fa fa-spinner fa-spin"></i> Salvando...');
    });
  });
</script>
